<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --bg-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text: #2d3436;
        }

        [data-theme="romantic"] {
            --primary: #e84393;
            --secondary: #fd79a8;
            --bg-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        [data-theme="dark"] {
            --primary: #a29bfe;
            --secondary: #6c5ce7;
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- UI COMPONENTS --- */

        .container {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            margin: 20px auto;
        }

        h1, h2 { font-family: 'Dancing Script', cursive; text-align: center; margin-bottom: 1.5rem; }
        h1 { font-size: 2.5rem; color: var(--primary); }

        .hidden { display: none !important; }

        /* --- FORM STYLING --- */

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.5);
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,117,140,0.3); }

        .letter-input-card {
            background: rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border-left: 5px solid var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        button:active { transform: translateY(0); }

        /* --- VIEW MODE: ENVELOPES --- */

        .envelopes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .envelope-wrapper {
            perspective: 1000px;
            cursor: pointer;
            height: 100px;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 80px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0; z-index: 2;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-top: 45px solid var(--secondary);
            transform-origin: top;
            transition: transform 0.4s 0.2s;
        }

        .envelope.open::before { transform: rotateX(180deg); z-index: 0; }
        .envelope.open { transform: translateY(20px); }

        .envelope-label {
            position: absolute;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: bold;
        }

        /* --- MODAL FOR LETTER CONTENT --- */

        #letter-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: 0.4s;
        }

        #letter-modal.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: #fff9f0;
            width: 85%;
            max-width: 400px;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #444;
            transform: translateY(50px);
            transition: 0.5s;
        }

        #letter-modal.active .modal-content { transform: translateY(0); }

        /* --- DECORATIONS --- */

        .floating {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        .audio-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .share-box {
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            word-break: break-all;
            font-size: 0.8rem;
            border: 2px dashed var(--primary);
        }

    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>
    
    <div id="create-mode" class="container">
        <h1>Create a Surprise ✨</h1>
        
        <div class="input-group">
            <label>Birthday Person's Name</label>
            <input type="text" id="target-name" placeholder="Enter name...">
        </div>

        <div id="letters-container">
            <label>Personal Messages (The Letters)</label>
            </div>

        <div class="input-group">
            <label>Aesthetic Theme</label>
            <select id="theme-select">
                <option value="pastel">Pastel Sparkles</option>
                <option value="romantic">Romantic Rose</option>
                <option value="dark">Midnight Magic</option>
            </select>
        </div>

        <button onclick="generateLink()">✨ Create Magical Link</button>

        <div id="link-result" class="hidden">
            <div class="share-box" id="share-url"></div>
            <button onclick="copyLink()" style="background: #2ecc71; margin-top: 10px;">📋 Copy Link</button>
        </div>
    </div>

    <div id="view-mode" class="container hidden">
        <h1 id="view-greeting">Happy Birthday!</h1>
        <p style="text-align: center; margin-bottom: 20px;">You have some secret letters waiting... Tap to open.</p>
        
        <div class="envelopes-grid" id="envelopes-grid">
            </div>

        <button onclick="location.href = location.pathname" style="margin-top: 40px; background: transparent; border: 1px solid var(--primary); color: var(--primary);">Create Your Own Surprise</button>
    </div>

    <div id="letter-modal" onclick="closeLetter()">
        <div class="modal-content" id="letter-body" onclick="event.stopPropagation()">
            </div>
    </div>

    <div class="audio-control" onclick="toggleAudio()">
        <span id="audio-icon">🔇</span>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Happy-Birthday-to-You-Preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const state = {
            letters: [
                { title: "Sweet Note", msg: "" },
                { title: "Best Memory", msg: "" },
                { title: "A Wish", msg: "" }
            ],
            audioPlaying: false
        };

        // --- INITIALIZATION ---

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('data');

            if (data) {
                renderViewMode(data);
            } else {
                renderCreateMode();
            }
            createFloatingElements();
        };

        function renderCreateMode() {
            const container = document.getElementById('letters-container');
            state.letters.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'letter-input-card';
                div.innerHTML = `
                    <input type="text" placeholder="Letter Title (e.g. Open Me First)" oninput="updateLetter(${i}, 'title', this.value)" value="${l.title}">
                    <textarea placeholder="Write your message here..." rows="3" style="margin-top:8px" oninput="updateLetter(${i}, 'msg', this.value)"></textarea>
                `;
                container.appendChild(div);
            });
        }

        function updateLetter(index, field, value) {
            state.letters[index][field] = value;
        }

        // --- LINK GENERATION ---

        function generateLink() {
            const name = document.getElementById('target-name').value;
            const theme = document.getElementById('theme-select').value;
            
            if(!name) return alert("Please enter a name!");

            const payload = {
                n: name,
                t: theme,
                m: state.letters.filter(l => l.msg.length > 0)
            };

            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
            const url = window.location.origin + window.location.pathname + '?data=' + encoded;
            
            document.getElementById('link-result').classList.remove('hidden');
            document.getElementById('share-url').innerText = url;
        }

        function copyLink() {
            const text = document.getElementById('share-url').innerText;
            navigator.clipboard.writeText(text);
            alert("Link copied! Send it to your favorite person. 💖");
        }

        // --- VIEW MODE LOGIC ---

        function renderViewMode(encodedData) {
            document.getElementById('create-mode').classList.add('hidden');
            document.getElementById('view-mode').classList.remove('hidden');

            try {
                const data = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
                document.body.setAttribute('data-theme', data.t);
                document.getElementById('view-greeting').innerText = `For ${data.n} 💖`;
                
                const grid = document.getElementById('envelopes-grid');
                data.m.forEach((letter, i) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'envelope-wrapper';
                    wrap.innerHTML = `
                        <div class="envelope" id="env-${i}">
                            <div class="envelope-label">${letter.title || 'Note'}</div>
                        </div>
                    `;
                    wrap.onclick = () => openLetter(letter.msg, i);
                    grid.appendChild(wrap);
                });

                startConfetti();
            } catch (e) {
                console.error("Error decoding surprise", e);
                alert("The link seems broken! Creating a new one.");
                window.location.search = "";
            }
        }

        function openLetter(msg, index) {
            const env = document.getElementById(`env-${index}`);
            env.classList.add('open');
            
            setTimeout(() => {
                const modal = document.getElementById('letter-modal');
                const body = document.getElementById('letter-body');
                modal.classList.add('active');
                
                // Typing effect
                body.innerHTML = "";
                let i = 0;
                function type() {
                    if (i < msg.length) {
                        body.innerHTML += msg.charAt(i);
                        i++;
                        setTimeout(type, 50);
                    }
                }
                type();
                
                if (navigator.vibrate) navigator.vibrate(50);
            }, 600);
        }

        function closeLetter() {
            document.getElementById('letter-modal').classList.remove('active');
        }

        // --- AESTHETICS ---

        function createFloatingElements() {
            const symbols = ['❤️', '✨', '🎈', '🌸', '⭐'];
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.className = 'floating';
                span.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                span.style.left = Math.random() * 100 + 'vw';
                span.style.top = Math.random() * 100 + 'vh';
                span.style.fontSize = (Math.random() * 20 + 10) + 'px';
                span.style.animationDelay = (Math.random() * 5) + 's';
                span.style.opacity = Math.random();
                document.body.appendChild(span);
            }
        }

        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 2,
                    d: Math.random() * 100,
                    color: `hsl(${Math.random() * 360}, 70%, 70%)`,
                    tilt: Math.random() * 10 - 10
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, i) => {
                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();
                    
                    p.y += Math.cos(p.d) + 1 + p.r / 2;
                    p.x += Math.sin(p.d) * 2;
                    p.tilt = Math.sin(p.d) * 15;

                    if (p.y > canvas.height) {
                        particles[i].y = -20;
                    }
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        function toggleAudio() {
            const audio = document.getElementById('bg-music');
            const icon = document.getElementById('audio-icon');
            if (state.audioPlaying) {
                audio.pause();
                icon.innerText = "🔇";
            } else {
                audio.play().catch(() => alert("Please interact with the page first to enable music!"));
                icon.innerText = "🎵";
            }
            state.audioPlaying = !state.audioPlaying;
        }
    </script>
</body>
</html>
